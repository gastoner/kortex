name: E2E Test Job

on:
  workflow_call:
    inputs:
      instance:
        description: 'GitHub Actions runner instance (e.g., macos-latest, windows-2025, ubuntu-24.04)'
        required: true
        type: string
      mode:
        description: 'Test mode (prod or dev)'
        required: true
        type: string
      compile_args:
        description: 'Arguments for pnpm compile:current (e.g., --win dir, --linux dir, --mac dir)'
        required: true
        type: string
      repo:
        description: 'Repository to checkout (e.g., owner/repo for forks). Defaults to the current repository.'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch, tag, or SHA to checkout. Defaults to the default branch.'
        required: false
        type: string
        default: ''
      inference_provider:
        description: 'Local inference provider: "ollama", "ramalama", or "none" to skip.'
        required: false
        type: string
        default: 'none'
      inference_model:
        description: 'Model to pull and serve (e.g., granite3.2:2b, phi4-mini, qwen2.5:3b).'
        required: false
        type: string
        default: 'granite3.2:2b'
      inference_second_model:
        description: 'Optional second inference model to pull (Ollama only, e.g., granite3.1-dense:2b).'
        required: false
        type: string
        default: ''
      test_script:
        description: 'pnpm script to run for E2E tests.'
        required: false
        type: string
        default: 'test:e2e'

jobs:
  e2e-test:
    name: ${{ inputs.inference_provider != 'none' && format('{0} ({1})', inputs.instance, inputs.inference_provider) || inputs.instance }}
    runs-on: ${{ inputs.instance }}
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ !startsWith(inputs.instance, 'ubuntu') && secrets.GEMINI_API_KEY || '' }}
      PODMAN_ENABLED: ${{ startsWith(inputs.instance, 'ubuntu') && 'true' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: ${{ inputs.ref || github.ref }}

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: podman-desktop/e2e/.github/actions/disk-cleanup@fe42dc2bd7b4aa6047e5d1f44c44adfded29baca

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install

      - name: Get Playwright version and cache path
        id: playwright-info
        shell: bash
        run: |
          echo "version=$(npx --yes playwright --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=$USERPROFILE/AppData/Local/ms-playwright" >> "$GITHUB_OUTPUT"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "path=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_OUTPUT"
          else
            echo "path=$HOME/.cache/ms-playwright" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ${{ steps.playwright-info.outputs.path }}
          key: playwright-${{ runner.os }}-${{ steps.playwright-info.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/playwright
        timeout-minutes: 3
        run: npx playwright install chromium

      - name: Enable Podman socket
        if: runner.os == 'Linux'
        run: |
          systemctl --user enable --now podman.socket
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          podman info

      - name: Setup Ollama
        if: inputs.inference_provider == 'ollama'
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ inputs.inference_model }}
          second_model: ${{ inputs.inference_second_model }}

      - name: Setup RamaLama
        if: inputs.inference_provider == 'ramalama'
        uses: ./.github/actions/setup-ramalama
        with:
          model: ${{ inputs.inference_model }}

      - name: Run Smoke E2E tests in ${{ inputs.mode == 'prod' && 'Production' || 'Development' }} Mode
        shell: bash
        env:
          VITE_CI: 'true'
        run: |
          # Derive binary path from instance (OS and architecture)
          INSTANCE="${{ inputs.instance }}"
          if [[ "$INSTANCE" == *"windows"* ]]; then
            if [[ "$INSTANCE" == *"arm"* ]]; then
              BINARY_PATH="./dist/win-arm64-unpacked/Kaiden.exe"
            else
              BINARY_PATH="./dist/win-unpacked/Kaiden.exe"
            fi
          elif [[ "$INSTANCE" == *"ubuntu"* ]] || [[ "$INSTANCE" == *"linux"* ]]; then
            BINARY_PATH="./dist/linux-unpacked/kaiden"
          elif [[ "$INSTANCE" == *"macos"* ]]; then
            BINARY_PATH="./dist/mac-arm64/Kaiden.app/Contents/MacOS/Kaiden"
          else
            echo "::error::Unknown instance: $INSTANCE. Cannot determine binary path."
            exit 1
          fi

          if [ "${{ inputs.mode }}" == "prod" ]; then
            echo "Compiling Kaiden in production mode"
            export ELECTRON_ENABLE_INSPECT=true
            pnpm compile:current ${{ inputs.compile_args }}

            path=$(realpath "$BINARY_PATH")
            echo "Kaiden built binary: $path"
            export KAIDEN_BINARY="$path"
          fi
          pnpm ${{ inputs.test_script }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6
        if: always()
        with:
          annotate_only: true
          fail_on_failure: true
          include_passed: true
          detailed_summary: true
          require_tests: true
          report_paths: '**/*results.xml'

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: results-e2e-${{ inputs.instance }}-${{ inputs.mode }}${{ inputs.inference_provider != 'none' && format('-{0}', inputs.inference_provider) || '' }}
          path: tests/playwright/output/**
          retention-days: 7
